<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Master | Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #00D2FC;
            --success: #00E676;
            --danger: #FF5252;
            --warning: #FFD740;
            --dark: #1A1A2E;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #141E30);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1, h2, h3 { text-align: center; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        h1 { background: linear-gradient(to right, var(--secondary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-group {
            position: relative;
            margin: 10px 0;
        }

        input, select {
            width: 100%;
            padding: 15px;
            padding-right: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 210, 252, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            font-size: 1.3rem;
            padding: 8px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            z-index: 10;
        }

        .toggle-password:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary { background: linear-gradient(45deg, var(--primary), #8E2DE2); color: white; }
        .btn-success { background: linear-gradient(45deg, #00b09b, #96c93d); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--glass-border); color: rgba(255,255,255,0.7); }
        .btn-outline:hover, .btn-outline.active { background: var(--glass); color: white; border-color: white; }
        .btn-danger { background: linear-gradient(45deg, #cb2d3e, #ef473a); color: white; }

        .hidden { display: none; }
        .error-msg { color: var(--danger); text-align: center; font-size: 0.9rem; min-height: 20px; margin-bottom: 10px; }
        .link { color: var(--secondary); cursor: pointer; text-decoration: underline; font-size: 0.9rem; text-align: center; display: block; margin-top: 15px; }

        .timer-display {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--warning);
            margin: 15px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .timer-warning { color: var(--danger); animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .game-header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .score-badge { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        
        .difficulty-info { text-align: center; margin-bottom: 15px; font-size: 0.9rem; color: rgba(255,255,255,0.6); }
        .sequence-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.8rem;
            text-align: center;
            margin: 20px 0;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--glass-border);
            color: var(--secondary);
            word-break: break-all;
        }

        .feedback { text-align: center; font-weight: bold; font-size: 1.2rem; min-height: 30px; margin: 10px 0; }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--danger); }

        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; }
        .leaderboard-table th { background: rgba(255,255,255,0.1); padding: 12px; text-align: left; font-size: 0.85rem; }
        .leaderboard-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 15px; }
        .nav-tabs button { margin: 0; border-radius: 10px; font-size: 0.9rem; padding: 10px; }

        .blocked-message {
            background: rgba(255, 82, 82, 0.2);
            border: 2px solid var(--danger);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .blocked-message h3 { color: var(--danger); margin-bottom: 10px; }
        .countdown { font-size: 2rem; font-weight: bold; color: var(--danger); font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div id="view-auth">
            <h1>Pattern Master</h1>
            <div id="auth-error" class="error-msg"></div>
            
            <div id="blocked-message" class="blocked-message hidden">
                <h3>🔒 Cuenta Bloqueada</h3>
                <p>Demasiados intentos fallidos. Intenta de nuevo en:</p>
                <div class="countdown" id="block-countdown">15:00</div>
            </div>
            
            <div id="form-login">
                <div class="input-group">
                    <input type="text" id="login-user" placeholder="Nombre de Usuario">
                </div>
                <div class="input-group">
                    <input type="password" id="login-pass" placeholder="Contraseña">
                    <button type="button" class="toggle-password" onclick="togglePassword('login-pass')">👁️</button>
                </div>
                <button class="btn-primary" onclick="login()">Iniciar Sesión</button>
                <span class="link" onclick="toggleAuth('register')">¿Nuevo? Crear cuenta</span>
            </div>

            <div id="form-register" class="hidden">
                <div class="input-group">
                    <input type="text" id="reg-user" placeholder="Elige un Usuario">
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass" placeholder="Contraseña">
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-pass')">👁️</button>
                </div>
                <button class="btn-success" onclick="register()">Registrarse</button>
                <span class="link" onclick="toggleAuth('login')">Volver al Login</span>
            </div>
        </div>

        <div id="view-main" class="hidden">
            <div class="nav-tabs">
                <button id="tab-game" class="btn-outline active" onclick="switchTab('game')">🎮 Jugar</button>
                <button id="tab-rank" class="btn-outline" onclick="switchTab('rank')">🏆 Ranking</button>
            </div>

            <div id="content-game">
                <div class="game-header">
                    <span id="user-display" style="font-weight:bold;">Jugador</span>
                    <div class="score-badge">⭐ <span id="score-display">0</span></div>
                </div>

                <div class="difficulty-info">
                    Nivel: 
                    <select id="diff-select" onchange="loadSequence()">
                        <option value="fácil">Fácil</option>
                        <option value="medio">Medio</option>
                        <option value="difícil">Difícil</option>
                        <option value="experto">Experto</option>
                    </select>
                    <br>
                    <small>Gana <span id="win-points">10</span> | Pierde <span id="lose-points">5</span></small>
                </div>

                <div class="timer-display" id="timer-display">⏱️ 20s</div>
                <div class="sequence-box" id="sequence-text">Cargando...</div>
                
                <input type="number" id="game-input" placeholder="¿Cuál es el siguiente número?" onkeypress="handleEnter(event)">
                <div id="game-feedback" class="feedback"></div>
                
                <button id="btn-submit" class="btn-primary" onclick="checkAnswer()">Verificar Respuesta</button>
                <button id="btn-next" class="btn-success hidden" onclick="loadSequence()">Siguiente Patrón ➜</button>
                
                <button class="btn-danger" style="margin-top: 30px;" onclick="logout()">Cerrar Sesión</button>
            </div>

            <div id="content-rank" class="hidden">
                <h2>Top 10 Maestros</h2>
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>#</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
                <button class="btn-primary" style="margin-top:20px;" onclick="switchTab('game')">Volver al Juego</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentSequenceId = null;
        let currentDifficulty = 'fácil';
        let timerInterval = null;
        let timeLeft = 20;
        let blockInterval = null;

        const POINTS_CONFIG = {
            'fácil': { win: 10, lose: 5 },
            'medio': { win: 20, lose: 10 },
            'difícil': { win: 40, lose: 20 },
            'experto': { win: 80, lose: 40 }
        };

        const TIMER_CONFIG = {
            'fácil': 20,
            'medio': 35,
            'difícil': 60,
            'experto': 90
        };

        function toggleAuth(mode) {
            document.getElementById('auth-error').innerText = '';
            document.getElementById('blocked-message').classList.add('hidden');
            if(mode === 'register') {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-register').classList.remove('hidden');
            } else {
                document.getElementById('form-register').classList.add('hidden');
                document.getElementById('form-login').classList.remove('hidden');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showView(viewId) {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function switchTab(tab) {
            document.getElementById('content-game').classList.add('hidden');
            document.getElementById('content-rank').classList.add('hidden');
            document.getElementById('tab-game').classList.remove('active');
            document.getElementById('tab-rank').classList.remove('active');

            if(tab === 'game') {
                document.getElementById('content-game').classList.remove('hidden');
                document.getElementById('tab-game').classList.add('active');
            } else {
                document.getElementById('content-rank').classList.remove('hidden');
                document.getElementById('tab-rank').classList.add('active');
                loadLeaderboard();
            }
        }

        async function register() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const res = await fetch('/api/register', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if(data.success) { 
                alert("¡Registro exitoso! Ahora inicia sesión."); 
                toggleAuth('login'); 
            } else {
                document.getElementById('auth-error').innerText = data.error;
            }
        }

        async function login() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const res = await fetch('/api/login', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if(data.success) {
                currentUser = data;
                document.getElementById('user-display').innerText = data.username;
                updateScoreDisplay(data.score_facil);
                showView('view-main');
                loadSequence();
            } else {
                document.getElementById('auth-error').innerText = data.error;
                if(data.blocked) {
                    document.getElementById('form-login').classList.add('hidden');
                    document.getElementById('blocked-message').classList.remove('hidden');
                    startBlockCountdown(data.remainingSeconds);
                }
            }
        }

        function startBlockCountdown(seconds) {
            let remaining = seconds;
            blockInterval = setInterval(() => {
                remaining--;
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                document.getElementById('block-countdown').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if(remaining <= 0) {
                    clearInterval(blockInterval);
                    document.getElementById('blocked-message').classList.add('hidden');
                    document.getElementById('form-login').classList.remove('hidden');
                    document.getElementById('auth-error').innerText = '';
                }
            }, 1000);
        }

        function logout() {
            currentUser = null;
            if(timerInterval) clearInterval(timerInterval);
            if(blockInterval) clearInterval(blockInterval);
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            showView('view-auth');
        }

        function updateScoreDisplay(newScore) {
            const el = document.getElementById('score-display');
            el.innerText = Math.round(newScore);
            if(currentUser) currentUser.score_facil = newScore;
        }

        function startTimer(seconds) {
            if(timerInterval) clearInterval(timerInterval);
            timeLeft = seconds;
            const timerDisplay = document.getElementById('timer-display');
            timerDisplay.classList.remove('timer-warning');
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 10) {
                    timerDisplay.classList.add('timer-warning');
                }
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('game-feedback').innerText = '⏰ ¡Tiempo agotado!';
                    document.getElementById('game-feedback').className = 'feedback wrong';
                    document.getElementById('game-input').disabled = true;
                    document.getElementById('btn-submit').classList.add('hidden');
                    document.getElementById('btn-next').classList.remove('hidden');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').innerText = `⏱️ ${timeLeft}s`;
        }

        async function loadSequence() {
            currentDifficulty = document.getElementById('diff-select').value;
            const config = POINTS_CONFIG[currentDifficulty];
            const timeLimit = TIMER_CONFIG[currentDifficulty];
            
            document.getElementById('win-points').innerText = `+${config.win}`;
            document.getElementById('lose-points').innerText = `-${config.lose}`;

            document.getElementById('game-input').value = '';
            document.getElementById('game-input').disabled = false;
            document.getElementById('btn-submit').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('game-feedback').innerText = '';
            document.getElementById('sequence-text').innerText = "Cargando...";

            const res = await fetch(`/api/nueva-secuencia?dificultad=${currentDifficulty}`);
            if(!res.ok) {
                document.getElementById('sequence-text').innerText = "Error cargando patrón";
                return;
            }
            const data = await res.json();
            currentSequenceId = data.id;
            document.getElementById('sequence-text').innerText = data.numeros;
            document.getElementById('game-input').focus();
            startTimer(data.timeLimit || timeLimit);
        }

        function handleEnter(e) { 
            if(e.key === 'Enter') checkAnswer(); 
        }

        async function checkAnswer() {
            const val = document.getElementById('game-input').value;
            const feedback = document.getElementById('game-feedback');
            const config = POINTS_CONFIG[currentDifficulty];

            if(val === '') return;

            const res = await fetch('/api/verificar', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: currentSequenceId, respuestaUsuario: val })
            });
            const data = await res.json();

            if(data.correcto) {
                feedback.innerText = `¡CORRECTO! +${config.win} Puntos`;
                feedback.className = "feedback correct";
                document.getElementById('game-input').disabled = true;
                document.getElementById('btn-submit').classList.add('hidden');
                document.getElementById('btn-next').classList.remove('hidden');
                if(timerInterval) clearInterval(timerInterval);
                
                const newScore = (currentUser[`score_${currentDifficulty}`] || 0) + config.win;
                currentUser[`score_${currentDifficulty}`] = newScore;
                updateScoreDisplay(newScore);
                await saveScore(config.win);
            } else {
                feedback.innerText = `INCORRECTO! -${config.lose} Puntos`;
                feedback.className = "feedback wrong";
                document.getElementById('game-input').value = '';
                if(timerInterval) clearInterval(timerInterval);
                
                const newScore = Math.max(0, (currentUser[`score_${currentDifficulty}`] || 0) - config.lose);
                currentUser[`score_${currentDifficulty}`] = newScore;
                updateScoreDisplay(newScore);
                await saveScore(-config.lose);
            }
        }

        async function saveScore(points) {
            try {
                await fetch('/api/update-score', {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        userId: currentUser.userId, 
                        points: points,
                        dificultad: currentDifficulty
                    })
                });
            } catch (e) {
                console.error("Error guardando:", e);
            }
        }

        async function loadLeaderboard() {
            const res = await fetch(`/api/leaderboard?dificultad=${currentDifficulty}`);
            const data = await res.json();
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            data.forEach((player, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${index + 1}</td>
                    <td>${player.username} ${player.username === currentUser?.username ? '(Tú)' : ''}</td>
                    <td style="font-weight:bold; color: var(--warning)">${player.score}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
